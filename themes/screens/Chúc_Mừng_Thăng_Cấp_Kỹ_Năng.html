        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Particle Animation - Legacy DOM particles removed for Canvas implementation */
        
        /* Pulse Animation */
        @keyframes epic-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2) drop-shadow(0 0 20px rgba(74, 158, 255, 0.8)); }
        }
        
        /* Breathing Glow Animation */
        @keyframes breathing-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(164, 201, 255, 0.4); }
            50% { box-shadow: 0 0 50px rgba(164, 201, 255, 0.8); }
        }
        
        @keyframes text-breathing-glow {
            0%, 100% { text-shadow: 0 0 10px rgba(64, 225, 126, 0.5); }
            50% { text-shadow: 0 0 25px rgba(64, 225, 126, 0.9); }
        }

        @media (prefers-reduced-motion: no-preference) {
            .animate-epic-pulse {
                animation: epic-pulse 2s ease-in-out infinite;
            }
            .animate-breathing-glow {
                animation: breathing-glow 3s ease-in-out infinite;
            }
            .animate-text-breathing-glow {
                animation: text-breathing-glow 3s ease-in-out infinite;
            }
        }

        /* Static states for reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .animate-epic-pulse,
            .animate-breathing-glow,
            .animate-text-breathing-glow {
                animation: none;
            }
            .animate-breathing-glow {
                box-shadow: 0 0 30px rgba(164, 201, 255, 0.6);
            }
            .animate-text-breathing-glow {
                text-shadow: 0 0 15px rgba(64, 225, 126, 0.7);
            }
        }

        /* Shimmer Animation */
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @media (prefers-reduced-motion: no-preference) {
            .shimmer-effect::after {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
                transform: skewX(-20deg);
                animation: shimmer 3s infinite;
            }
        }

        #particle-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5; /* Between background and content */
        }
    </style>

<script>
        // Check for reduced motion preference
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (!prefersReducedMotion) {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let burstParticles = [];
            
            // Resize canvas
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Particle configurations
            const colors = {
                blue: { r: 74, g: 158, b: 255 }, // primary-container
                gold: { r: 255, g: 219, b: 60 }, // secondary-container
                white: { r: 255, g: 255, b: 255 }
            };

            class ManaOrb {
                constructor() {
                    this.reset();
                    this.y = Math.random() * canvas.height; // Initial random spread
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + Math.random() * 100;
                    this.size = Math.random() * 8 + 4;
                    this.speedY = Math.random() * -1 - 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.color = Math.random() > 0.3 ? colors.blue : colors.gold;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.pulse = Math.random() * Math.PI * 2;
                    this.pulseSpeed = Math.random() * 0.05 + 0.01;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.pulse += this.pulseSpeed;
                    
                    if (this.y < -50) {
                        this.reset();
                    }
                }
                draw() {
                    const currentOpacity = this.opacity + Math.sin(this.pulse) * 0.2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    
                    // Glow effect
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${currentOpacity})`);
                    gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
                    
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }

            class Sparkle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 1;
                    this.life = 0;
                    this.maxLife = Math.random() * 100 + 50;
                    this.color = Math.random() > 0.5 ? colors.white : colors.gold;
                }
                update() {
                    this.life++;
                    if (this.life >= this.maxLife) {
                        this.reset();
                    }
                }
                draw() {
                    const progress = this.life / this.maxLife;
                    const opacity = Math.sin(progress * Math.PI); // Fade in and out
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${opacity})`;
                    ctx.fill();
                }
            }

            class BurstParticle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 15 + 5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.size = Math.random() * 5 + 2;
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.01;
                    this.color = Math.random() > 0.5 ? colors.blue : colors.gold;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= 0.95; // friction
                    this.vy *= 0.95;
                    this.life -= this.decay;
                }
                draw() {
                    if (this.life <= 0) return;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.life})`;
                    ctx.fill();
                }
            }

            // Initialize background particles
            for (let i = 0; i < 30; i++) particles.push(new ManaOrb());
            for (let i = 0; i < 50; i++) particles.push(new Sparkle());

            // Trigger burst at center behind skill icon (roughly upper middle)
            function triggerBurst() {
                const centerX = canvas.width / 2;
                const centerY = canvas.height * 0.35; // approximate icon position
                for (let i = 0; i < 100; i++) {
                    burstParticles.push(new BurstParticle(centerX, centerY));
                }
            }

            // Animation loop
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Update and draw background particles
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                // Update and draw burst particles
                for (let i = burstParticles.length - 1; i >= 0; i--) {
                    let bp = burstParticles[i];
                    bp.update();
                    bp.draw();
                    if (bp.life <= 0) {
                        burstParticles.splice(i, 1);
                    }
                }

                requestAnimationFrame(animate);
            }

            animate();
            
            // Trigger burst slightly after load for effect
            setTimeout(triggerBurst, 100);
        }
    </script>
