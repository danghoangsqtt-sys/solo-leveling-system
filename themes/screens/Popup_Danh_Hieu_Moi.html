<style>
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 15px rgba(255, 219, 60, 0.6)); }
            50% { opacity: 0.8; filter: drop-shadow(0 0 25px rgba(255, 219, 60, 0.9)); }
        }
        @keyframes sweep {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(200%) rotate(45deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes particle-up {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }
        
        .mythic-glow {
            animation: pulse-glow 3s infinite;
        }
        .shimmer-wrapper {
            overflow: hidden;
            position: relative;
        }
        .shimmer-wrapper::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.1) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            animation: sweep 4s infinite linear;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: #ffdb3c;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-up linear infinite;
        }

        .bg-rays {
            background: conic-gradient(from 0deg at 50% 50%, 
                rgba(255, 219, 60, 0) 0deg, 
                rgba(255, 219, 60, 0.1) 45deg, 
                rgba(255, 219, 60, 0) 90deg, 
                rgba(255, 219, 60, 0.1) 135deg, 
                rgba(255, 219, 60, 0) 180deg, 
                rgba(255, 219, 60, 0.1) 225deg, 
                rgba(255, 219, 60, 0) 270deg, 
                rgba(255, 219, 60, 0.1) 315deg, 
                rgba(255, 219, 60, 0) 360deg);
            animation: spin 30s linear infinite;
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>

<!-- Particle Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.body;
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                createParticle();
            }

            function createParticle() {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random properties
                const size = Math.random() * 4 + 2; // 2px to 6px
                const left = Math.random() * 100; // 0% to 100%
                const top = Math.random() * 100; // 0% to 100%
                const duration = Math.random() * 3 + 2; // 2s to 5s
                const delay = Math.random() * 5; // 0s to 5s
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}%`;
                particle.style.top = `${top}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                
                container.appendChild(particle);
            }
        });
    </script>
