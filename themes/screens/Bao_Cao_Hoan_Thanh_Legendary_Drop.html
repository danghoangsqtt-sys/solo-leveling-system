<style>
        .glow-text {
            text-shadow: 0 0 10px rgba(164,201,255,0.8), 0 0 20px rgba(164,201,255,0.4);
        }
        .glow-gold {
            text-shadow: 0 0 10px rgba(233,196,0,0.8), 0 0 20px rgba(233,196,0,0.4);
        }
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to right,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.1) 50%,
                rgba(255,255,255,0) 100%
            );
            transform: rotate(30deg);
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }
        .pulse-bar {
            animation: pulse-fill 2s ease-in-out forwards;
        }
        @keyframes pulse-fill {
            0% { width: 0%; }
            100% { width: 75%; }
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float-up 5s infinite ease-in-out;
        }
        .particle-orb {
            background: rgba(164, 201, 255, 0.6);
            box-shadow: 0 0 10px rgba(164, 201, 255, 0.8);
        }
        .particle-sparkle {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, rgba(164,201,255,0), rgba(164,201,255,0.2), rgba(164,201,255,0));
            animation: scan 4s infinite linear;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes scan {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(100vh); }
        }

        .entrance-text {
            animation: entranceText 1.5s ease-out forwards;
        }
        @keyframes entranceText {
            0% { transform: scale(0.5); opacity: 0; text-shadow: 0 0 0 rgba(164,201,255,0); }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 30px rgba(164,201,255,1); }
            100% { transform: scale(1); opacity: 1; text-shadow: 0 0 10px rgba(164,201,255,0.8), 0 0 20px rgba(164,201,255,0.4); }
        }

        .entrance-card {
            animation: entranceCard 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }
        @keyframes entranceCard {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .card-flip {
            perspective: 1000px;
        }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .card-flip.is-flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .card-back {
            transform: rotateY(180deg);
        }

        .burst-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #a4c9ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #a4c9ff;
            pointer-events: none;
            z-index: 20;
        }

        .btn-breathing {
            animation: breathe 2s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 15px rgba(164,201,255,0.4); }
            50% { box-shadow: 0 0 25px rgba(164,201,255,0.8); }
        }

        @media (prefers-reduced-motion: reduce) {
            .particle, .scan-line, .shimmer::after, .burst-particle { display: none; animation: none; }
            .entrance-text, .entrance-card { animation: none; opacity: 1; transform: none; }
            .card-inner { transition: none; }
            .btn-breathing { animation: none; }
            .pulse-bar { animation: none; width: 75%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    .legendary-border {
        background: linear-gradient(45deg, #ffd700, #ff8c00, #ffd700);
        background-size: 200% 200%;
        animation: borderGradient 3s linear infinite;
    }
    @keyframes borderGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .holographic-shimmer {
        position: relative;
        overflow: hidden;
    }
    .holographic-shimmer::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 70%);
        background-size: 200% 200%;
        animation: holoMove 2s infinite linear;
        pointer-events: none;
        z-index: 10;
    }
    @keyframes holoMove {
        0% { transform: translateX(-100%) translateY(-100%); }
        100% { transform: translateX(100%) translateY(100%); }
    }
    .divine-beam {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 2px;
        height: 400px;
        background: linear-gradient(to top, transparent, #ffd700, transparent);
        transform-origin: center;
        opacity: 0;
        pointer-events: none;
    }
    .glow-legendary {
        text-shadow: 0 0 10px #ffd700, 0 0 20px #ff8c00, 0 0 30px #ffd700;
    }
</style></head>
<body class="bg-background text-on-surface w-full min-h-screen overflow-hidden flex items-center justify-center relative">
<!-- Ambient Particles Background -->
<div class="absolute inset-0 z-0 pointer-events-none" id="particles">
<!-- Particles added via JS -->
</div>
<div class="scan-line"></div>
<!-- Main Overlay Container -->
<div class="relative z-10 w-full max-w-lg mx-auto flex flex-col items-center p-6 gap-8">
<!-- Header -->
<div class="text-center w-full relative entrance-text">
<h1 class="font-display-lg text-display-lg text-primary glow-text tracking-widest mb-4">QUEST COMPLETE!</h1>
<div class="h-px w-full bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
</div>
<!-- Rewards Section -->
<div class="w-full bg-surface-container-low/60 backdrop-blur-[40px] rounded-xl border border-white/12 p-6 flex flex-col gap-4 shadow-[0_10px_40px_rgba(0,0,0,0.6)] entrance-card" style="animation-delay: 0.2s;">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-2">REWARDS GAINED</h2>
<!-- EXP -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<span class="font-body-bold text-body-base text-primary">EXP</span>
<span class="font-body-bold text-body-base text-primary">+250</span>
</div>
<div class="h-2 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary pulse-bar shadow-[0_0_10px_#a4c9ff]"></div>
</div>
</div>
<!-- Gold -->
<div class="flex justify-between items-center mt-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary-fixed-dim" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
<span class="font-body-bold text-body-base text-secondary-fixed-dim">Gold</span>
</div>
<span class="font-body-bold text-body-base text-secondary-fixed-dim glow-gold">+100</span>
</div>
<!-- SP -->
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-body-bold text-body-base text-tertiary-fixed-dim">Skill Points (Reading Fluency)</span>
</div>
<span class="font-body-bold text-body-base text-tertiary-fixed-dim">+15</span>
</div>
</div>
<!-- Mystery Card -->
<div class="relative w-48 h-64 card-flip cursor-pointer group entrance-card" id="loot-card" style="animation-delay: 0.4s;">
<div class="absolute inset-0 flex items-center justify-center pointer-events-none" id="divine-beams"></div><div class="absolute inset-0 bg-secondary-fixed-dim/20 blur-xl rounded-xl group-hover:bg-secondary-fixed-dim/40 transition-all duration-500" id="card-glow"></div>
<div class="card-inner rounded-xl border border-secondary-fixed-dim shadow-[0_0_20px_rgba(233,196,0,0.3)] shimmer legendary-border holographic-shimmer" id="card-inner-border">
<!-- Front -->
<div class="card-front bg-surface-container-high/90 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/12">
<span class="font-display-lg text-display-lg text-secondary-fixed-dim glow-gold">?</span>
</div>
<!-- Back -->
<div class="card-back bg-surface-container-high/90 backdrop-blur-md rounded-xl flex flex-col items-center justify-center p-4 border border-primary text-center"><span class="material-symbols-outlined text-secondary-fixed-dim text-5xl mb-2" style="font-variation-settings: 'FILL' 1; text-shadow: 0 0 15px rgba(233,196,0,0.9);">pan_tool</span>
<span class="font-label-caps text-label-caps text-secondary-fixed-dim glow-legendary">LEGENDARY ITEM</span>
<span class="font-headline-md text-headline-md text-secondary-fixed-dim mt-1">Shadow Monarch's Gauntlet</span></div>
</div>
<p class="absolute -bottom-8 w-full text-center font-label-caps text-label-caps text-on-surface-variant animate-pulse" id="reveal-text">TAP TO REVEAL YOUR REWARD</p>
</div>
<!-- Claim Button -->
<button class="mt-8 px-12 py-4 bg-primary-container/20 border border-primary text-primary font-headline-md text-headline-md rounded-xl backdrop-blur-md hover:bg-primary-container/40 active:scale-95 transition-all duration-300 btn-breathing shimmer w-full entrance-card" style="animation-delay: 0.6s;">
            CLAIM ALL
        </button>
</div>
<script>
        // Particle system
        const particleContainer = document.getElementById('particles');
        const isReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (!isReducedMotion) {
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                const isSparkle = Math.random() > 0.7;
                particle.classList.add('particle', isSparkle ? 'particle-sparkle' : 'particle-orb');
                
                // Randomize properties
                const size = isSparkle ? (Math.random() * 6 + 4) : (Math.random() * 4 + 2);
                const left = Math.random() * 100;
                const delay = Math.random() * 5;
                const duration = Math.random() * 4 + 4;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}vw`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;
                
                particleContainer.appendChild(particle);
            }
        }

        // Card Flip Logic
        const lootCard = document.getElementById('loot-card');
        const revealText = document.getElementById('reveal-text');
        const cardGlow = document.getElementById('card-glow');
        const cardInnerBorder = document.getElementById('card-inner-border');
        let isFlipped = false;

        lootCard.addEventListener('click', () => {
            if (isFlipped) return;
            isFlipped = true;
            
            lootCard.classList.add('is-flipped');
            revealText.textContent = 'RARE ITEM ACQUIRED!';
            revealText.classList.remove('animate-pulse');
            revealText.classList.add('text-primary');
            revealText.style.textShadow = '0 0 10px rgba(164,201,255,0.8)';
            
            // Change glow colors
            cardGlow.classList.remove('bg-secondary-fixed-dim/20', 'group-hover:bg-secondary-fixed-dim/40');
            cardGlow.classList.add('bg-primary/30');
            cardInnerBorder.classList.remove('border-secondary-fixed-dim', 'shadow-[0_0_20px_rgba(233,196,0,0.3)]');
            cardInnerBorder.classList.add('border-primary', 'shadow-[0_0_30px_rgba(164,201,255,0.6)]');

            if (!isReducedMotion) {
                createBurstParticles(lootCard);
            }
        });

        function createBurstParticles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 20; i++) {
                const burst = document.createElement('div');
                burst.classList.add('burst-particle');
                document.body.appendChild(burst);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                burst.style.left = `${centerX}px`;
                burst.style.top = `${centerY}px`;

                burst.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 400,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                    fill: 'forwards'
                }).onfinish = () => burst.remove();
            }
        }
    </script>
<script>
    const legendaryCard = document.getElementById('loot-card');
    const beamsContainer = document.getElementById('divine-beams');
    
    function createBeams() {
        for (let i = 0; i < 12; i++) {
            const beam = document.createElement('div');
            beam.className = 'divine-beam';
            beam.style.transform = `rotate(${i * 30}deg)`;
            beamsContainer.appendChild(beam);
            beam.animate([
                { opacity: 0, height: '0px' },
                { opacity: 0.6, height: '400px' },
                { opacity: 0, height: '500px' }
            ], {
                duration: 2000,
                iterations: Infinity,
                delay: i * 150
            });
        }
    }

    legendaryCard.addEventListener('click', () => {
        const revealText = document.getElementById('reveal-text');
        revealText.textContent = 'LEGENDARY ITEM UNLOCKED!';
        revealText.classList.add('text-secondary-fixed-dim', 'glow-legendary');
        
        createBeams();
        
        // Intense Gold Particle Burst
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.style.position = 'fixed';
            p.style.width = '8px';
            p.style.height = '8px';
            p.style.background = '#ffd700';
            p.style.boxShadow = '0 0 15px #ff8c00';
            p.style.borderRadius = '50%';
            p.style.zIndex = '50';
            document.body.appendChild(p);
            
            const rect = legendaryCard.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 200;
            
            p.animate([
                { transform: `translate(${x}px, ${y}px) scale(1)`, opacity: 1 },
                { transform: `translate(${x + Math.cos(angle) * dist}px, ${y + Math.sin(angle) * dist}px) scale(0)`, opacity: 0 }
            ], { duration: 1000 + Math.random() * 500, easing: 'ease-out' }).onfinish = () => p.remove();
        }
    });
</script></body></html>
