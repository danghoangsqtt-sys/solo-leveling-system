<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .rare-border {
            border: 1px solid theme('colors.secondary-fixed');
            box-shadow: inset 0 0 10px rgba(233, 196, 0, 0.2);
        }
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0) 40%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(30deg);
            animation: shimmerEffect 4s infinite linear;
        }
        @keyframes shimmerEffect {
            0% { transform: translate(-50%, -50%) rotate(30deg); }
            100% { transform: translate(50%, 50%) rotate(30deg); }
        }
        
        .progress-bar-fill {
            background: linear-gradient(90deg, theme('colors.primary-container'), theme('colors.primary'));
            box-shadow: 0 0 10px theme('colors.primary');
        }

        .bg-cosmic-void {
            background: radial-gradient(circle at top right, rgba(74, 158, 255, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(233, 196, 0, 0.05) 0%, transparent 40%),
                        theme('colors.background');
        }
      </style>
